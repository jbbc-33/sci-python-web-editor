<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Python Web</title>

    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: #1e1e1e;
            color: white;
            font-family: Arial;
        }

        /* PANEL LATERAL */
        #sidebar {
            width: 200px;
            background: #252526;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
        }

        #file-list {
            flex: 1;
            overflow-y: auto;
        }

        .file {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }

        .file.active {
            background: #1e1e1e;
            font-weight: bold;
        }

        #sidebar button {
            padding: 10px;
            background: #0e639c;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* EDITOR */
        #editor-container {
            width: 50%;
            display: flex;
            flex-direction: column;
        }

        #editor {
            flex: 1;
        }

        #controls {
            padding: 10px;
            background: #252526;
        }

        #controls button {
            padding: 8px 16px;
            background: #0e639c;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }

        /* SALIDA */
        #right {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: #111;
        }

        /* Área de salida con scroll */
        #output-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Contenedor del botón CLEAR */
        #clear-container {
            padding: 10px;
            display: flex;
            justify-content: flex-start; /* botón alineado a la izquierda */
        }

        /* Botón CLEAR con tamaño similar a Ejecutar */
        #clear-btn {
            padding: 8px 16px;
            background: #a80000;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            flex-shrink: 0; /* evita que cambie de tamaño */
        }
    </style>
</head>
<body>

    <!-- PANEL LATERAL -->
    <div id="sidebar">
        <div id="file-list"></div>
        <button onclick="newFile()">Nuevo archivo</button>
        <button onclick="deleteFile()">Eliminar archivo</button>
    </div>

    <!-- EDITOR -->
    <div id="editor-container">
        <div id="editor"></div>
        <div id="controls">
            <button onclick="runCode()">Ejecutar</button>
        </div>
    </div>

    <!-- SALIDA -->
    <div id="right">
        <div id="output-area">
            <div id="output">Salida...</div>
            <img id="plot" />
        </div>

        <div id="clear-container">
            <button id="clear-btn" onclick="clearOutput()">Clear</button>
        </div>
    </div>

    <!-- MONACO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

    <script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});

    let editor;

    // Archivos en memoria
    let files = {
        "main.py": `print("Archivo principal")`
    };

    // Salidas por archivo
    let outputs = {
        "main.py": { text: "", image: "" }
    };

    let activeFile = "main.py";

    function renderFileList() {
        const list = document.getElementById("file-list");
        list.innerHTML = "";

        Object.keys(files).forEach(filename => {
            const div = document.createElement("div");
            div.className = "file" + (filename === activeFile ? " active" : "");
            div.innerText = filename;
            div.onclick = () => switchFile(filename);
            list.appendChild(div);
        });
    }

    function showOutput(filename) {
        const out = outputs[filename] || { text: "", image: "" };

        document.getElementById("output").innerText = out.text;

        if (out.image && out.image.length > 10) {
            const img = document.getElementById("plot");
            img.src = "data:image/png;base64," + out.image;
            img.style.display = "block";
        } else {
            document.getElementById("plot").style.display = "none";
        }
    }

    function switchFile(filename) {
        // Guardar contenido del archivo actual
        if (editor) {
            files[activeFile] = editor.getValue();
        }

        // Cambiar archivo activo
        activeFile = filename;

        // Cargar contenido en Monaco
        editor.setValue(files[filename]);

        // Mostrar salida del archivo
        showOutput(filename);

        renderFileList();
    }

    function newFile() {
        const count = Object.keys(files).length + 1;
        const name = "archivo" + count + ".py";

        files[name] = `print("Nuevo archivo: ${name}")`;
        outputs[name] = { text: "", image: "" };

        activeFile = name;
        editor.setValue(files[name]);

        renderFileList();
        showOutput(name);
    }

    function deleteFile() {
        const keys = Object.keys(files);
        if (keys.length === 1) {
            alert("Debe existir al menos un archivo.");
            return;
        }

        delete files[activeFile];
        delete outputs[activeFile];

        activeFile = Object.keys(files)[0];
        editor.setValue(files[activeFile]);

        renderFileList();
        showOutput(activeFile);
    }

    function clearOutput() {
        outputs[activeFile] = { text: "", image: "" };
        showOutput(activeFile);
    }

    require(["vs/editor/editor.main"], function () {
        editor = monaco.editor.create(document.getElementById("editor"), {
            value: files[activeFile],
            language: "python",
            theme: "vs-dark",
            automaticLayout: true,
            fontSize: 16,
            minimap: { enabled: false }
        });

        renderFileList();
        showOutput(activeFile);
    });

    async function runCode() {
        const code = editor.getValue();

        const response = await fetch("http://127.0.0.1:5000/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
        });

        const result = await response.json();

        // Guardar salida del archivo actual
        outputs[activeFile] = {
            text: result.output,
            image: result.image
        };

        // Mostrar salida
        showOutput(activeFile);
    }
    </script>

</body>
</html>
